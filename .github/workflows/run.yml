name: Steam New Releases Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python steam_new_releases_bot.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Sauvegarder les jeux déjà postés
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_releases.json
          git diff --staged --quiet || git commit -m "Update seen releases"
          git push
